name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# pippin-mcp targets macOS 26 (Foundation Models framework). GitHub-hosted
# runners ship the macOS 26 SDK via Xcode 26 but the underlying runner OS is
# older, so the FoundationModels dylib isn't available at runtime. We compile
# in CI to catch source breakage; tests and binary smoke run only work on a
# real macOS 26 host. Until macos-26 runners ship, run `swift test` locally.
jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick newest installed Xcode
        run: |
          newest=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $newest"
          sudo xcode-select -s "$newest/Contents/Developer"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build -v

      - name: Build (release)
        run: swift build -c release
